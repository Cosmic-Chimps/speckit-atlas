name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Type-check, lint, format, core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
      - run: npm run test:core

  integration:
    name: Editor integration (${{ matrix.vscode }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test against the declared engines floor and the current stable release.
        vscode: ["1.90.0", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: xvfb-run -a npm run test:integration
        env:
          VSCODE_TEST_VERSION: ${{ matrix.vscode }}
