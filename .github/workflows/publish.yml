name: Publish

# Publishing is driven by version tags. To cut a release:
#   1. Bump "version" in package.json and update CHANGELOG.md.
#   2. git tag v0.1.0 && git push origin v0.1.0
# The tag must match package.json's version (enforced below).
#
# Required repository secrets:
#   VSCE_PAT  — Azure DevOps PAT with Marketplace > Manage scope (VS Code Marketplace).
#   OVSX_PAT  — Open VSX access token (https://open-vsx.org/user-settings/tokens).
on:
  push:
    tags: ["v*.*.*"]

jobs:
  # Reuse the full CI gate (type-check, lint, format, tests, size, integration)
  # so nothing gets published unless the exact tagged commit is green.
  verify:
    uses: ./.github/workflows/ci.yml

  publish:
    name: Package & publish
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG. Bump the version, commit, then re-tag."
            exit 1
          fi

      # Package once (runs vscode:prepublish → production build) and publish the
      # same .vsix to both registries so they are byte-for-byte identical.
      - name: Package .vsix
        run: npx --no-install @vscode/vsce package -o speckit-atlas.vsix

      - name: Publish to VS Code Marketplace
        run: npx --no-install @vscode/vsce publish --packagePath speckit-atlas.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Open VSX is secondary; a hiccup there must not block a successful
      # Marketplace release. Re-run this job to retry it.
      - name: Publish to Open VSX
        continue-on-error: true
        run: npx --yes ovsx publish speckit-atlas.vsix --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: speckit-atlas-vsix
          path: speckit-atlas.vsix
